                        <label class="flex items-center space-x-1 cursor-pointer">

                            <span>ET</span>
                        </label>
                        <label class="flex items-center space-x-1 cursor-pointer">
                            <input type="radio" name="catOp" value="OR" class="text-blue-600">
                            <span>OU</span>
                        </label>
                    </div>

                    <select id="cat2" class="border rounded px-3 py-1.5 outline-none focus:border-blue-500 w-full sm:w-1/3">
                        <option value="">-- Catégorie B --</option>
                    </select>
                </div>

                    <div class="flex items-center">
                        <label class="mr-2 font-semibold text-slate-700">Recette Expert :</label>
                        <select id="filterExp" class="border rounded px-3 py-1.5 outline-none focus:border-blue-500">
                            <option value="">Tous</option>
                            <option value="Oui">Oui</option>
                            <option value="Non">Non</option>
                        </select>
                    </div>
                    <div class="flex items-center">

                        </select>
                    </div>
                </div>
            </div>

        { n: 88, obj: "Vase en porcelaine manufacturé", val: 72, c1: "Article du quotidien", c2: "En céramique", exp: "Non", ing: "3 x Granite insulaire | 3 x Quartz insulaire | 2 x Argile insulaire" },
        { n: 138, obj: "Verre isolant manufacturé", val: 80, c1: "En céramique", c2: "", exp: "Non", ing: "4 x Spectrite insulaire | 4 x Sable insulaire" },
        { n: 114, obj: "Vinaigrette manufacturée", val: 52, c1: "Condiment", c2: "", exp: "Non", ing: "2 x Oignon exotique | 1 x Sève insulaire | 1 x Sargasse tamamo insulaire" }
    ];

    // Ajout d'un identifiant unique (id) à chaque objet pour gérer la case à cocher
    const data = rawData.map((item, index) => ({ ...item, id: index }));
    let currentData = [...data];

    // Stockage des IDs sélectionnés (Ensemble pour éviter les doublons)
    const selectedIds = new Set();

    // Éléments du DOM
    const tableBody = document.getElementById('tableBody');
    const countSpan = document.getElementById('count');
    const inputs = [
        'searchObj', 'searchIng', 'minN', 'maxN', 'minV', 'maxV', 'filterExp', 'cat1', 'cat2', 'filterSel'
    ].map(id => document.getElementById(id));
    const radios = document.querySelectorAll('input[name="catOp"]');

    // Initialisation dynamique des menus déroulants de catégories
    const uniqueCategories = [...new Set(data.flatMap(d => [d.c1, d.c2]).filter(Boolean))].sort();

    function populateSelect(selectEl) {
        uniqueCategories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat; opt.textContent = cat;
            selectEl.appendChild(opt);
        });
    }
    populateSelect(inputs[7]); // cat1
    populateSelect(inputs[8]); // cat2

    // Fonction pour gérer le clic sur une checkbox
    window.toggleSelection = function(id) {
        if (selectedIds.has(id)) {
            selectedIds.delete(id);
        } else {
            selectedIds.add(id);
        }
        // On réapplique les filtres au cas où le filtre "Sélection" serait actif
        applyFilters();
    };

    // Fonction d'affichage du tableau
    function render(filteredData) {
        tableBody.innerHTML = filteredData.map(d => `
                <tr class="hover:bg-blue-50 transition-colors ${selectedIds.has(d.id) ? 'bg-blue-50/50' : ''}">
                    <td class="p-3 border-b text-center">
                        <input type="checkbox" class="custom-checkbox"
                               ${selectedIds.has(d.id) ? 'checked' : ''}
                               onchange="toggleSelection(${d.id})">
                    </td>
                    <td class="p-3 border-b text-center font-mono">${d.n}</td>
                    <td class="p-3 border-b font-medium text-blue-900">${d.obj}</td>
                    <td class="p-3 border-b text-emerald-600 font-bold font-mono text-center">${d.val}</td>
                    <td class="p-3 border-b text-xs">
                        <span class="inline-block bg-slate-200 px-2 py-1 rounded mb-1 sm:mb-0">${d.c1}</span>
                        ${d.c2 ? `<span class="inline-block bg-slate-100 px-2 py-1 rounded italic border">${d.c2}</span>` : ''}
                    </td>
                    <td class="p-3 border-b text-center">
                        <span class="${d.exp === 'Oui' ? 'text-orange-600 font-bold bg-orange-100 px-2 py-1 rounded' : 'text-slate-400'}">${d.exp}</span>
                    </td>
                    <td class="p-3 border-b text-xs text-slate-600 whitespace-normal min-w-[250px] leading-relaxed">
                        ${d.ing.split(' | ').join('<br>')}
                    </td>
                </tr>
            `).join('');
        countSpan.textContent = filteredData.length;
    }

    // Moteur de filtrage principal
    function applyFilters() {
        const sObj = inputs[0].value.toLowerCase();
        const sIng = inputs[1].value.toLowerCase();
        const minN = parseInt(inputs[2].value) || 0;
        const maxN = parseInt(inputs[3].value) || 999;
        const minV = parseInt(inputs[4].value) || 0;
        const maxV = parseInt(inputs[5].value) || 9999;
        const exp = inputs[6].value;
        const catA = inputs[7].value;
        const catB = inputs[8].value;
        const sel = inputs[9].value;
        const op = document.querySelector('input[name="catOp"]:checked').value;

        currentData = data.filter(d => {
            // Filtre de sélection
            if (sel === 'checked' && !selectedIds.has(d.id)) return false;
            if (sel === 'unchecked' && selectedIds.has(d.id)) return false;

            // Filtres texte
            if (sObj && !d.obj.toLowerCase().includes(sObj)) return false;
            if (sIng && !d.ing.toLowerCase().includes(sIng)) return false;

            // Filtres numériques
            if (d.n < minN || d.n > maxN) return false;
            if (d.val < minV || d.val > maxV) return false;

            // Filtre Expert
            if (exp !== "" && d.exp !== exp) return false;

            // Filtre Catégories (Logique complexe ET/OU)
            if (catA || catB) {
                const itemCats = [d.c1, d.c2].filter(Boolean);
                const hasA = itemCats.includes(catA);
                const hasB = itemCats.includes(catB);

                if (catA && catB) {
                    if (op === "AND" && !(hasA && hasB)) return false;
                    if (op === "OR" && !(hasA || hasB)) return false;
                } else if (catA && !hasA) {
                    return false;
                } else if (catB && !hasB) {
                    return false;
                }
            }

            return true;
        });

        // On conserve le tri actif s'il y en a un
        if (sortConfig.key) {
            trierDonnees(sortConfig.key, false);
        } else {
            render(currentData);
        }
    }

    // Gestion du tri des colonnes
    let sortConfig = { key: null, direction: 1 };
    function sortTable(key) {
        trierDonnees(key, true);
    }

    function trierDonnees(key, toggleDirection = false) {
        if (toggleDirection) {
            if (sortConfig.key === key) {
                sortConfig.direction *= -1; // Inverse la direction
            } else {
                sortConfig.key = key;
                sortConfig.direction = 1;
            }
        }

        currentData.sort((a, b) => {
            let valA = a[key];
            let valB = b[key];

            if (typeof valA === 'string') valA = valA.toLowerCase();
            if (typeof valB === 'string') valB = valB.toLowerCase();

            if (valA < valB) return -1 * sortConfig.direction;
            if (valA > valB) return 1 * sortConfig.direction;
            return 0;
        });
        render(currentData);
    }

    // Fonction pour vider tous les filtres
    function resetFilters() {
        inputs.forEach(input => input.value = input.id === 'filterSel' ? 'all' : '');
        radios[0].checked = true; // Remet "ET" par défaut
        applyFilters();
    }

    // Ajout des écouteurs d'événements
    inputs.forEach(input => {
        input.addEventListener('input', applyFilters);
        input.addEventListener('change', applyFilters);
    });
    radios.forEach(radio => radio.addEventListener('change', applyFilters));

    // Rendu initial
    render(currentData);
</script>
</body>
</html>
